    <script>
        // Google Sheet published CSV URL
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1mYcTzwPrcWj61xjZpFxaOtDGmcl4Vw-4vMGp1bmkqjQ/pub?gid=0&single=true&output=csv';

        // Parse CSV text into array of arrays
        function parseCSV(text) {
            const lines = text.split('\n');
            return lines.map(line => {
                const result = [];
                let current = '';
                let inQuotes = false;
                
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        result.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                result.push(current.trim());
                return result;
            });
        }

        // Parse money string to number
        function parseMoney(str) {
            if (!str || str === '' || str === '$0') return 0;
            return parseInt(str.replace(/[$,]/g, '')) || 0;
        }

        // Format number as currency
        function formatMoney(num) {
            return '$' + num.toLocaleString();
        }

        // Generate trophy emojis based on win count
        function getTrophies(wins) {
            const winCount = parseInt(wins) || 0;
            return '🏆'.repeat(winCount);
        }

        // Fetch and render data
        async function loadData() {
            try {
                const response = await fetch(SHEET_URL);
                const text = await response.text();
                const data = parseCSV(text);
                
                // Parse header to understand column structure
                // Expected: Pick, Gearoid's Team, $, Wins, Dave's Team, Wins, $, John's Team, $, Wins
                const header = data[0];
                
                // Build teams data structure
                const teams = {
                    "Gearoid's Team": { name: "Gearoid's Team", players: [], total: 0, wins: 0 },
                    "Dave's Team": { name: "Dave's Team", players: [], total: 0, wins: 0 },
                    "John's Team": { name: "John's Team", players: [], total: 0, wins: 0 }
                };

                // Parse rows (skip header, skip last row which has totals)
                for (let i = 1; i < data.length; i++) {
                    const row = data[i];
                    if (!row[0] || row[0] === '') continue; // Skip empty rows or total row
                    
                    const pick = row[0];
                    
                    // Gearoid's Team: columns 1 (name), 2 (money), 3 (wins)
                    if (row[1]) {
                        const earnings = parseMoney(row[2]);
                        const wins = parseInt(row[3]) || 0;
                        teams["Gearoid's Team"].players.push({
                            pick: pick,
                            name: row[1],
                            earnings: earnings,
                            wins: wins
                        });
                        teams["Gearoid's Team"].total += earnings;
                        teams["Gearoid's Team"].wins += wins;
                    }
                    
                    // Dave's Team: columns 4 (name), 5 (wins), 6 (money)
                    if (row[4]) {
                        const earnings = parseMoney(row[6]);
                        const wins = parseInt(row[5]) || 0;
                        teams["Dave's Team"].players.push({
                            pick: pick,
                            name: row[4],
                            earnings: earnings,
                            wins: wins
                        });
                        teams["Dave's Team"].total += earnings;
                        teams["Dave's Team"].wins += wins;
                    }
                    
                    // John's Team: columns 7 (name), 8 (money), 9 (wins)
                    if (row[7]) {
                        const earnings = parseMoney(row[8]);
                        const wins = parseInt(row[9]) || 0;
                        teams["John's Team"].players.push({
                            pick: pick,
                            name: row[7],
                            earnings: earnings,
                            wins: wins
                        });
                        teams["John's Team"].total += earnings;
                        teams["John's Team"].wins += wins;
                    }
                }

                // Sort teams by total earnings
                const sortedTeams = Object.values(teams).sort((a, b) => b.total - a.total);
                
                // Assign places
                const places = ['first-place', 'second-place', 'third-place'];
                const placeLabels = ['1ST', '2ND', '3RD'];

                // Render teams
                const container = document.getElementById('teamsContainer');
                container.innerHTML = sortedTeams.map((team, index) => `
                    <div class="team-card ${places[index]}">
                        <div class="leader-badge">${placeLabels[index]}</div>
                        <div class="team-header">
                            <div class="team-name">${team.name}</div>
                            <div class="team-total">Total: <span>${formatMoney(team.total)}</span></div>
                            <div class="team-wins">Wins: <span>${team.wins > 0 ? '🏆'.repeat(team.wins) : '-'}</span></div>
                        </div>
                        <table class="roster-table">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Player</th>
                                    <th>Earnings</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${team.players.map(player => `
                                    <tr>
                                        <td class="pick-num">${player.pick}</td>
                                        <td class="player-name">${player.name}${player.wins > 0 ? ` <span class="trophy">${'🏆'.repeat(player.wins)}</span>` : ''}</td>
                                        <td class="prize-money${player.earnings === 0 ? ' zero' : ''}">${formatMoney(player.earnings)}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `).join('');

                // Update timestamp
                document.getElementById('lastUpdated').textContent = 
                    'Last updated: ' + new Date().toLocaleString();

            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('teamsContainer').innerHTML = 
                    '<div class="loading" style="color: #cc0000;">Error loading data. Please refresh the page.</div>';
            }
        }

        // Load data on page load
        loadData();

        // Auto-refresh every 5 minutes (300000ms)
        setInterval(loadData, 300000);
    </script>
